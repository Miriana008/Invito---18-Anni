<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invito Miriana</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">
</head>
<body>

<!-- ROSE SFONDO -->
<div class="rose-bg rose-top-left" style="background-image: url('foto/rose1.png');"></div>
<div class="rose-bg rose-top-right" style="background-image: url('foto/rose2.png');"></div>
<div class="rose-bg rose-bottom-left" style="background-image: url('foto/rose3.png');"></div>
<div class="rose-bg rose-bottom-right" style="background-image: url('foto/rose4.png');"></div>

<div class="invito">
    <p class="apri-text">Apri l'invito</p>
    <div class="busta" onclick="apri()">
        <div class="flap"></div>
        <div class="lettera">M</div>
        <div class="sigillo">M</div>
    </div>
</div>

<script>
function apri() {
    document.querySelector(".busta").classList.add("open");
    setTimeout(() => { window.location.href = "home.html"; }, 1200);
}
</script>

</body>
</html>
